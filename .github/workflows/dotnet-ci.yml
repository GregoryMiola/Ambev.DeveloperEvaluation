name: .NET Backend CI

on:
  # Dispara a pipeline em pushes para as branches dev e main
  push:
    branches: [ "main", "dev" ]
  # Dispara a pipeline em Pull Requests que têm como alvo as branches dev e main
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Define o diretório de trabalho padrão para todos os comandos run
    # Isso simplifica os comandos, pois não precisamos repetir o caminho
    defaults:
      run:
        working-directory: ./template/backend/src

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore 
      working-directory: ./template/backend

    - name: Build solution
      run: dotnet build --no-restore
      working-directory: ./template/backend

    - name: Run tests
      run: dotnet test --no-build --verbosity normal
      working-directory: ./template/backend
